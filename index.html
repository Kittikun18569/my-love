<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ขอโทษนะคนดี</title>
    <style>
        body {
            font-family: 'Kanit', sans-serif;
            background-color: #fff0f3;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: #4a4a4a;
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }
        h1 { color: #ff4d6d; }
        .heart { font-size: 50px; color: #ff4d6d; margin-bottom: 10px; }
        .photo-placeholder {
            width: 100%;
            height: 200px;
            background: #eee;
            border-radius: 15px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        img { width: 100%; height: 100%; object-fit: cover; }
        .buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 20px;
        }
        button {
            padding: 10px 25px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
        }
        #yesBtn { background-color: #ff4d6d; color: white; }
        #noBtn { background-color: #ddd; color: #666; position: relative; }
        #message { margin-top: 20px; font-weight: bold; color: #ff4d6d; display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="heart">❤️</div>
    <h1>เค้าขอโทษนะ...</h1>
    
    <div class="photo-placeholder">
        <img src="https://via.placeholder.com/400x250?text=Your+Cute+Photo" alt="Our Memory">
    </div>

    <p>อย่าโกรธเค้าเลยนะคนเก่ง วันนี้เค้าสำนึกผิดแล้วจริงๆ สัญญาว่าวันหลังจะน่ารักให้มากกว่านี้ครับ</p>
    
    <div class="buttons">
        <button id="yesBtn" onclick="forgive()">ให้อภัย</button>
        <button id="noBtn" onmouseover="moveButton()">ไม่โกรธหรอก (มั้ง)</button>
    </div>

    <div id="message">เย้! รักเธอที่สุดในโลกเลยยย 🌹✨</div>
</div>

<script>
    function forgive() {
        document.getElementById('message').style.display = 'block';
        document.getElementById('yesBtn').style.display = 'none';
        document.getElementById('noBtn').style.display = 'none';
        alert("ขอบคุณนะครับ! สัญญาว่าจะดูแลหัวใจเธอให้ดีที่สุด ❤️");
    }

    function moveButton() {
        const x = Math.random() * (window.innerWidth - 100);
        const y = Math.random() * (window.innerHeight - 50);
        const btn = document.getElementById('noBtn');
        btn.style.position = 'fixed';
        btn.style.left = x + 'px';
        btn.style.top = y + 'px';
    }
</script>

</body>
</html>
